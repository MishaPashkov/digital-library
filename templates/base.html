<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<title>{% block title %}Бібліотека{% endblock %}</title>
<style>
   body{
      background-color:#E8CBA0;
   }
   .navbar-custom{
      background-color:#6F4C3E;
   }
   .library-card{
      background-color:#D9B68D;
      border:none;
      border-radius:15px;
   }
   .book-cover-container{
      aspect-ratio: 2 / 3;
      overflow:hidden;
   }
   .book-cover{
      width:100%;
      height:100%;
      object-fit:cover;
   }
   .book-cover-placeholder{
      aspect-ratio: 2 / 3;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      background:#C2B280;
      color:#6F4C3E;
      font-size:50px;
      border-radius:10px;
      text-align:center;
   }
   .detail-cover-container{
      aspect-ratio: 2 / 3;
      max-width:400px;
   }
   .detail-cover{
      width:100%;
      height:100%;
      object-fit:cover;
   }
   .detail-cover-placeholder{
      width:100%;
      height:600px;
      display:flex;
      justify-content:center;
      align-items:center;
      font-size:120px;
      background:#C2B280;
   }
   .btn-main{
      background-color:#A67C4D;
      color:white;
      border:none;
   }
   .btn-main:hover{
      background-color:#8d683e;
      color:white;
   }
   .btn-light-brown{
      background-color:#C2B280;
      border:none;
      color:#3a2a22;
   }
   .btn-light-brown:hover{
      background-color:#b3a26d;
      color:#3a2a22;
   }
   .page-center{
      min-height:80vh;
      display:flex;
      justify-content:center;
      align-items:center;
   }
   .form-control{
      border:1px solid #C2B280;
   }
   .form-control:focus{
      border-color:#A67C4D;
      box-shadow:0 0 0 .25rem rgba(166,124,77,.25);
   }
   a{
      color:#6F4C3E;
   }
   a:hover{
      color:#A67C4D;
   }
   h1,h2,h3,h4,h5{
      color:#6F4C3E;
   }
   .btn-category{
      background-color:#C2B280;
      color:#3a2a22;
      border:none;
   }
   .btn-category:hover{
      background-color:#A67C4D;
      color:white;
   }
</style>
</head>
<body>
   <nav class="navbar navbar-expand-lg navbar-custom">
      <div class="container">
         <a class="navbar-brand text-white fw-bold" href="/">📚 Digital Library</a>
         <div>
            {% if user.is_authenticated %}
               <span class="text-white me-3">{{ user.username }}</span>
               <a href="{% url 'logout' %}" class="btn btn-light-brown">Вийти</a>
            {% else %}
               <a href="{% url 'login' %}" class="btn btn-light-brown">Увійти</a>
            {% endif %}
         </div>
      </div>
   </nav>
   <div class="container py-4">
      {% block content %}
      {% endblock %}
   </div>
</body>
</html>
