{% extends 'base.html' %}
{% block content %}
<div class="card library-card shadow border-danger">
    <div class="card-body">
        <h2 class="text-danger">Видалення книги</h2>
        <p class="fs-5">Ви дійсно бажаєте видалити книгу<strong>"{{ book.title }}"</strong>?</p>
        <form method="POST">
            {% csrf_token %}
            <button class="btn btn-danger">Видалити</button>
            <a href="{% url 'book_detail' book.id %}" class="btn btn-secondary">Скасувати</a>
        </form>
    </div>
</div>
{% endblock %}
