{% extends 'base.html' %}
{% block content %}
<div class="card library-card shadow">
    <div class="card-body">
        <h2 class="mb-4">Додати книгу</h2>
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            <button class="btn btn-main">Зберегти</button>
            <a href="/" class="btn btn-secondary">Скасувати</a>
        </form>
    </div>
</div>
{% endblock %}
